<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compte à rebours</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1: #0a0e2e;
    --bg-2: #241452;
    --bg-3: #4a1a6b;
    --bg-4: #1b0f3e;
    --accent: #a78bfa;
    --accent-soft: rgba(199,182,255,0.65);
    --white: #ffffff;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
    width:100%;
    overflow:hidden;
  }

  body{
    font-family:'Montserrat', sans-serif;
    background:
      radial-gradient(90% 70% at 15% 10%, rgba(74,26,107,0.9) 0%, rgba(74,26,107,0) 60%),
      radial-gradient(80% 70% at 85% 90%, rgba(36,20,82,0.95) 0%, rgba(36,20,82,0) 60%),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-4) 45%, var(--bg-2) 75%, var(--bg-3) 100%);
    background-size: 100% 100%, 100% 100%, 100% 200%;
    animation: bgshift 18s ease-in-out infinite alternate;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
  }

  @keyframes bgshift{
    0%{ background-position: 0% 0%, 0% 0%, 0% 0%; }
    100%{ background-position: 0% 0%, 0% 0%, 0% 100%; }
  }

  /* Ambient drifting glow */
  .glow{
    position:absolute;
    border-radius:50%;
    filter: blur(110px);
    opacity:0.55;
    pointer-events:none;
  }
  .glow-1{
    width:65vmax; height:65vmax;
    background: #6d5bd0;
    top:-25%; left:-20%;
    animation: drift1 22s ease-in-out infinite alternate;
  }
  .glow-2{
    width:55vmax; height:55vmax;
    background: #3f6bff;
    bottom:-25%; right:-15%;
    animation: drift2 26s ease-in-out infinite alternate;
  }
  .glow-3{
    width:40vmax; height:40vmax;
    background: #9b4fd6;
    top:35%; left:60%;
    opacity:0.35;
    animation: drift1 30s ease-in-out infinite alternate-reverse;
  }

  @keyframes drift1{
    0%{ transform: translate(0,0) scale(1); }
    100%{ transform: translate(6%, 8%) scale(1.12); }
  }
  @keyframes drift2{
    0%{ transform: translate(0,0) scale(1); }
    100%{ transform: translate(-7%, -6%) scale(1.15); }
  }

  /* Faint stars for depth */
  .stars{
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 70% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 40% 70%, rgba(255,255,255,0.35), transparent),
      radial-gradient(2px 2px at 85% 65%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 55% 45%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 10% 80%, rgba(255,255,255,0.35), transparent);
    opacity:0.6;
    pointer-events:none;
  }

  .stage{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:clamp(2.2rem, 5vw, 3.6rem);
    padding: 6vh 6vw;
    text-align:center;
  }

  h1{
    color: var(--white);
    font-weight:800;
    letter-spacing:0.03em;
    line-height:1.3;
    font-size: clamp(1.5rem, 3.3vw, 2.7rem);
    max-width: 21ch;
    text-shadow:
      0 4px 24px rgba(0,0,0,0.65),
      0 8px 60px rgba(70,40,160,0.55),
      0 0 40px rgba(160,120,255,0.25);
    text-transform: uppercase;
  }

  h1 .amour{
    display:block;
    font-style:italic;
    font-weight:700;
    font-size: 0.58em;
    letter-spacing:0.1em;
    color: var(--white);
    margin-top:0.65em;
    text-transform:none;
    text-shadow:
      0 4px 20px rgba(0,0,0,0.6),
      0 0 35px rgba(160,120,255,0.35);
  }

  .counter{
    display:flex;
    gap: clamp(0.7rem, 2.6vw, 1.6rem);
  }

  .unit{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-width: clamp(72px, 12vw, 132px);
    padding: clamp(1rem, 2.2vw, 1.6rem) clamp(0.4rem, 1.5vw, 1rem);
    background: linear-gradient(160deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow:
      0 8px 32px rgba(20,10,60,0.45),
      inset 0 1px 0 rgba(255,255,255,0.15);
  }

  .value{
    font-weight:700;
    font-size: clamp(2.3rem, 7.2vw, 4.8rem);
    color: var(--white);
    font-variant-numeric: tabular-nums;
    line-height:1;
    text-shadow:
      0 3px 16px rgba(0,0,0,0.55),
      0 0 26px rgba(167,139,250,0.5);
    transition: opacity 0.2s ease;
  }

  .label{
    margin-top: clamp(0.5rem, 1.5vw, 0.9rem);
    font-size: clamp(0.58rem, 1.05vw, 0.8rem);
    letter-spacing:0.24em;
    text-transform:uppercase;
    color: var(--accent-soft);
    font-weight:600;
  }

  .sep{
    color: var(--accent-soft);
    font-weight:200;
    font-size: clamp(1.6rem, 5vw, 3rem);
    align-self:center;
    opacity:0.6;
  }

  @media (max-width: 480px){
    .counter{ gap: 0.45rem; }
    .sep{ display:none; }
    .unit{ min-width: 68px; padding: 0.8rem 0.3rem; border-radius: 14px; }
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="glow glow-1"></div>
<div class="glow glow-2"></div>
<div class="glow glow-3"></div>

<div class="stage">
  <h1>Temps restant avant de passer les vacances de notre vie<span class="amour">(alcool et piscine a volonté)</span></h1>

  <div class="counter" id="counter">
    <div class="unit"><div class="value" id="jours">00</div><div class="label">Jours</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="value" id="heures">00</div><div class="label">Heures</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="value" id="minutes">00</div><div class="label">Minutes</div></div>
    <div class="sep">:</div>
    <div class="unit"><div class="value" id="secondes">00</div><div class="label">Secondes</div></div>
  </div>
</div>

<script>
  // 7 août 2026, minuit, heure de Belgique (UTC+2, heure d'été)
  const cible = new Date("2026-08-07T00:00:00+02:00").getTime();

  const elJours = document.getElementById('jours');
  const elHeures = document.getElementById('heures');
  const elMinutes = document.getElementById('minutes');
  const elSecondes = document.getElementById('secondes');

  function pad(n){ return String(n).padStart(2, '0'); }

  function tick(){
    const maintenant = Date.now();
    let diff = cible - maintenant;

    if (diff <= 0){
      elJours.textContent = "00";
      elHeures.textContent = "00";
      elMinutes.textContent = "00";
      elSecondes.textContent = "00";
      return;
    }

    const jours = Math.floor(diff / (1000 * 60 * 60 * 24));
    diff -= jours * (1000 * 60 * 60 * 24);
    const heures = Math.floor(diff / (1000 * 60 * 60));
    diff -= heures * (1000 * 60 * 60);
    const minutes = Math.floor(diff / (1000 * 60));
    diff -= minutes * (1000 * 60);
    const secondes = Math.floor(diff / 1000);

    elJours.textContent = pad(jours);
    elHeures.textContent = pad(heures);
    elMinutes.textContent = pad(minutes);
    elSecondes.textContent = pad(secondes);
  }

  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
