<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — X</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Coolvetica';
      src: url('https://db.onlinewebfonts.com/t/c1cb5de10a43a01b1a40e86fdbba3b2e.woff2') format('woff2'),
           url('https://db.onlinewebfonts.com/t/c1cb5de10a43a01b1a40e86fdbba3b2e.woff') format('woff');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #141414; --border: rgba(255,255,255,0.08);
      --white: #f0f0f0; --muted: rgba(240,240,240,0.38);
      --accent: #7c6af7; --grid: rgba(255,255,255,0.03);
      --display: 'Coolvetica','Arial Black',sans-serif; --sans: 'Inter',system-ui,sans-serif;
    }
    html, body { height: 100%; }
    body { font-family: var(--sans); color: var(--white); background-color: var(--bg);
      background-image: linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
      background-size: 48px 48px; -webkit-font-smoothing: antialiased; }

    /* LOGIN */
    #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-box { width:340px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:40px 32px; display:flex; flex-direction:column; gap:20px; }
    .login-title { font-family:var(--display); font-size:2rem; }
    .login-sub { font-size:0.78rem; color:var(--muted); margin-top:-12px; }
    .login-box input[type="password"] { width:100%; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:8px; padding:12px 14px; color:var(--white); font-family:var(--sans); font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    .login-box input:focus { border-color:var(--accent); }
    .login-box input::placeholder { color:var(--muted); }
    .btn-primary { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:12px; font-family:var(--sans); font-size:0.9rem; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
    .btn-primary:hover { opacity:0.85; }
    #login-error { font-size:0.78rem; color:#f87171; display:none; }

    /* ADMIN */
    #admin-ui { display:none; min-height:100vh; }
    .admin-header { border-bottom:1px solid var(--border); padding:24px 40px; display:flex; align-items:center; justify-content:space-between; }
    .admin-logo { font-family:var(--display); font-size:1.6rem; }
    .admin-logo span { opacity:0.3; }
    .btn-logout { background:none; border:1px solid var(--border); color:var(--muted); border-radius:6px; padding:6px 14px; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
    .btn-logout:hover { border-color:var(--muted); color:var(--white); }
    .admin-body { display:grid; grid-template-columns:240px 1fr; min-height:calc(100vh - 73px); }

    /* SIDEBAR */
    .sidebar { border-right:1px solid var(--border); padding:24px 16px; display:flex; flex-direction:column; gap:6px; }
    .sidebar-label { font-size:0.65rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); padding:0 8px; margin-bottom:4px; margin-top:8px; }
    .sidebar-btn { background:none; border:none; color:var(--muted); font-family:var(--sans); font-size:0.88rem; padding:9px 12px; border-radius:8px; cursor:pointer; text-align:left; transition:background 0.15s,color 0.15s; display:flex; align-items:center; gap:10px; width:100%; }
    .sidebar-btn:hover, .sidebar-btn.active { background:rgba(255,255,255,0.06); color:var(--white); }
    .sidebar-btn.active { font-weight:500; }
    .sidebar-divider { height:1px; background:var(--border); margin:6px 0; }

    /* PANEL */
    .editor-panel { padding:40px 48px; display:flex; flex-direction:column; gap:22px; max-width:800px; }
    .editor-panel h2 { font-family:var(--display); font-weight:normal; font-size:1.9rem; }
    .field { display:flex; flex-direction:column; gap:8px; }
    .field label { font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
    .field input, .field select, .field textarea { background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; color:var(--white); font-family:var(--sans); font-size:0.95rem; padding:12px 14px; outline:none; transition:border-color 0.2s; resize:none; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color:var(--muted); }
    .field select option { background:#1a1a1a; }

    .toolbar { display:flex; gap:6px; flex-wrap:wrap; padding:8px 10px; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-bottom:none; border-radius:8px 8px 0 0; }
    .toolbar button { background:none; border:1px solid transparent; color:var(--muted); border-radius:5px; padding:4px 10px; font-size:0.82rem; font-family:var(--sans); cursor:pointer; transition:all 0.15s; }
    .toolbar button:hover { background:rgba(255,255,255,0.07); color:var(--white); border-color:var(--border); }
    .toolbar-sep { width:1px; background:var(--border); margin:2px; }
    .body-area { border-radius:0 0 8px 8px !important; min-height:300px; line-height:1.7; }

    .hint { font-size:0.73rem; color:var(--muted); line-height:1.7; }
    .hint code { background:rgba(255,255,255,0.07); border-radius:4px; padding:1px 5px; color:var(--white); font-size:0.77rem; }

    .preview-box { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:24px 28px; line-height:1.8; font-size:0.95rem; min-height:100px; }
    .preview-box h1 { font-family:var(--display); font-weight:normal; font-size:1.9rem; margin-bottom:16px; }
    .preview-box h2 { font-family:var(--display); font-weight:normal; font-size:1.4rem; margin:18px 0 8px; }
    .preview-box p { margin-bottom:10px; color:rgba(240,240,240,0.8); }
    .preview-box strong { color:var(--white); font-weight:600; }
    .preview-box em { font-style:italic; color:rgba(240,240,240,0.65); }
    .preview-box blockquote { border-left:2px solid var(--accent); padding-left:16px; color:var(--muted); margin:14px 0; }

    .row-btns { display:flex; gap:12px; align-items:center; }
    .btn-save { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:12px 28px; font-family:var(--sans); font-size:0.9rem; font-weight:600; cursor:pointer; transition:opacity 0.2s; }
    .btn-save:hover { opacity:0.85; }
    .btn-secondary { background:none; border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:12px 20px; font-family:var(--sans); font-size:0.88rem; cursor:pointer; transition:all 0.2s; }
    .btn-secondary:hover { border-color:var(--muted); color:var(--white); }
    .save-msg { font-size:0.8rem; color:#86efac; display:none; }
    .err-msg { font-size:0.8rem; color:#f87171; display:none; }

    .articles-list { display:flex; flex-direction:column; gap:10px; }
    .article-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:10px; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:16px; }
    .article-card-title { font-size:0.95rem; font-weight:500; }
    .article-card-meta { font-size:0.72rem; color:var(--muted); margin-top:3px; }
    .article-card-btns { display:flex; gap:8px; flex-shrink:0; }
    .btn-edit, .btn-delete { background:none; border:1px solid var(--border); border-radius:6px; padding:6px 12px; font-size:0.78rem; cursor:pointer; transition:all 0.15s; font-family:var(--sans); }
    .btn-edit { color:var(--muted); }
    .btn-edit:hover { color:var(--white); border-color:var(--muted); }
    .btn-delete { color:#f87171; }
    .btn-delete:hover { background:rgba(248,113,113,0.1); border-color:#f87171; }
    .empty-msg { color:var(--muted); font-size:0.88rem; padding:12px 0; }

    @media (max-width:700px) {
      .admin-body { grid-template-columns:1fr; }
      .sidebar { border-right:none; border-bottom:1px solid var(--border); flex-direction:row; flex-wrap:wrap; }
      .editor-panel { padding:24px 20px; }
    }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-title">X<span style="opacity:0.3">.</span></div>
    <p class="login-sub">Accès administration</p>
    <input type="password" id="pwd-input" placeholder="Mot de passe" />
    <p id="login-error">Mot de passe incorrect.</p>
    <button class="btn-primary" onclick="tryLogin()">Entrer</button>
  </div>
</div>

<div id="admin-ui">
  <div class="admin-header">
    <div class="admin-logo">X<span>.</span> <span style="font-family:var(--sans);font-size:0.8rem;opacity:0.4;margin-left:10px;font-weight:400;">Admin</span></div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
  <div class="admin-body">
    <div class="sidebar">
      <div class="sidebar-label">Actions</div>
      <button class="sidebar-btn active" id="btn-new" onclick="showNew()">✦ Nouvel article</button>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Catégories</div>
      <button class="sidebar-btn" onclick="showList('philosophie')">— Philosophie</button>
      <button class="sidebar-btn" onclick="showList('psychologie')">— Psychologie</button>
      <button class="sidebar-btn" onclick="showList('theologie')">— Théologie</button>
      <button class="sidebar-btn" onclick="showList('sciences')">— Sciences</button>
      <button class="sidebar-btn" onclick="showList('it')">— IT</button>
    </div>
    <div class="editor-panel" id="main-panel"></div>
  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
  const sb = createClient(
    'https://grqekegolbyfetkwozmb.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdycWVrZWdvbGJ5ZmV0a3dvem1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMDE4NTIsImV4cCI6MjA5Njc3Nzg1Mn0.uovx6O56Q0O6o70R5Cawc_oVnoauNY3myEpKLoZ_qug'
  );

  const PASSWORD = "admin123";
  const labels = {philosophie:'Philosophie',psychologie:'Psychologie',theologie:'Théologie',sciences:'Sciences',it:'IT'};

  // ── AUTH ──
  window.tryLogin = () => {
    if (document.getElementById('pwd-input').value === PASSWORD) {
      sessionStorage.setItem('x_admin','1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-ui').style.display = 'block';
      showNew();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  };
  document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key==='Enter') window.tryLogin(); });
  window.logout = () => { sessionStorage.removeItem('x_admin'); location.reload(); };
  if (sessionStorage.getItem('x_admin')==='1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-ui').style.display = 'block';
    showNew();
  }

  // ── HELPERS ──
  function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderMD(text) {
    if (!text) return '';
    return text.split('\n').map(line => {
      const imgMatch = line.trim().match(/^!\[([^\]]*)\]\(([^)]+)\)(?:\[size:(\d{1,4})(?:x(\d{1,4}))?\])?$/);
      if (imgMatch) {
        const w = imgMatch[3] ? parseInt(imgMatch[3]) : null;
        const h = imgMatch[4] ? parseInt(imgMatch[4]) : null;
        let style = 'border-radius:10px;display:block;margin:16px 0;max-width:100%;';
        if (w && h)      style += `width:${w}px;height:${h}px;object-fit:cover;`;
        else if (w)      style += `width:${w}px;height:auto;`;
        else             style += 'width:100%;';
        return `<img src="${imgMatch[2]}" alt="" style="${style}">`;
      }
      if (/^### (.+)/.test(line)) return `<h2 style="font-family:var(--display);font-weight:normal;font-size:1.2rem;margin:16px 0 6px">${inl(line.slice(4))}</h2>`;
      if (/^## (.+)/.test(line))  return `<h2 style="font-family:var(--display);font-weight:normal;font-size:1.5rem;margin:20px 0 8px">${inl(line.slice(3))}</h2>`;
      if (/^> (.+)/.test(line))   return `<blockquote>${inl(line.slice(2))}</blockquote>`;
      if (/^---/.test(line))      return `<hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:16px 0"/>`;
      if (/^- (.+)/.test(line))   return `<p>• ${inl(line.slice(2))}</p>`;
      if (line.trim()==='')       return '';
      return `<p>${inl(line)}</p>`;
    }).join('');
  }
  function inl(t) {
    return t
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/\*(.+?)\*/g,'<em>$1</em>');
  }

  // ── TOOLBAR ──
  window.wrap = (b,a) => {
    const ta = document.getElementById('art-body'); if (!ta) return;
    const s=ta.selectionStart, e=ta.selectionEnd, sel=ta.value.slice(s,e)||'texte';
    ta.setRangeText(b+sel+a,s,e,'end'); ta.dispatchEvent(new Event('input')); ta.focus();
  };
  window.insertImg = () => {
    const url = prompt('Colle le lien de ton image (imgbb, imgur, etc.) :');
    if (!url) return;
    const w = prompt('Largeur en pixels (vide = pleine largeur) :', '');
    let sizeTag = '';
    if (w) {
      const h = prompt('Hauteur en pixels (vide = proportionnelle) :', '');
      sizeTag = h ? `[size:${w}x${h}]` : `[size:${w}]`;
    }
    const ta = document.getElementById('art-body'); if (!ta) return;
    const s = ta.selectionStart;
    const txt = `\n![](${url})${sizeTag}\n`;
    ta.setRangeText(txt, s, s, 'end');
    ta.dispatchEvent(new Event('input'));
    ta.focus();
  };
  window.insertLine = prefix => {
    const ta = document.getElementById('art-body'); if (!ta) return;
    const s = ta.selectionStart;
    ta.setRangeText('\n'+prefix, s, s, 'end'); ta.dispatchEvent(new Event('input')); ta.focus();
  };

  // ── EDITOR ──
  let editingId = null;
  window.showNew = () => {
    editingId = null;
    setSidebarActive('btn-new');
    document.getElementById('main-panel').innerHTML = editorHTML();
    setupPreview();
  };

  function editorHTML(a) {
    return `
      <h2>${a ? "Modifier l'article" : "Nouvel article"}</h2>
      <div class="field"><label>Titre</label><input type="text" id="art-title" placeholder="Titre de l'article" value="${a ? esc(a.title) : ''}" /></div>
      <div class="field"><label>Catégorie</label>
        <select id="art-cat">
          ${Object.entries(labels).map(([v,l]) => `<option value="${v}" ${a&&a.category===v?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div class="field"><label>Contenu</label>
        <div class="toolbar">
          <button onclick="wrap('**','**')"><b>B</b></button>
          <button onclick="wrap('*','*')"><em>I</em></button>
          <div class="toolbar-sep"></div>
          <button onclick="insertLine('## ')">H2</button>
          <button onclick="insertLine('### ')">H3</button>
          <div class="toolbar-sep"></div>
          <button onclick="insertLine('> ')">❝</button>
          <button onclick="insertLine('---')">—</button>
          <button onclick="insertLine('- ')">• Liste</button>
          <div class="toolbar-sep"></div>
          <button onclick="insertImg()">🖼 Image</button>
        </div>
        <textarea class="body-area" id="art-body" placeholder="Écris ton article ici...&#10;&#10;**gras**  *italique*  ## Titre  > Citation  - Liste">${a ? esc(a.body) : ''}</textarea>
      </div>
      <div class="hint"><code>**gras**</code> · <code>*italique*</code> · <code>## Titre</code> · <code>### Sous-titre</code> · <code>> Citation</code> · <code>---</code> · <code>- Liste</code> · <code>![](url)</code> image · <code>![](url)[size:400]</code> largeur 400px · <code>![](url)[size:400x250]</code> largeur x hauteur</div>
      <div class="field"><label>Aperçu</label><div class="preview-box" id="preview-box"><span style="color:var(--muted);font-size:0.85rem">L'aperçu apparaît ici...</span></div></div>
      <div class="row-btns">
        <button class="btn-save" onclick="saveArticle()">${a ? 'Sauvegarder' : 'Publier'}</button>
        <button class="btn-secondary" onclick="showNew()">Effacer</button>
        <span class="save-msg" id="save-msg">✓ Publié avec succès</span>
        <span class="err-msg" id="err-msg">Erreur lors de la publication.</span>
      </div>
    `;
  }

  function setupPreview() {
    const ta = document.getElementById('art-body');
    const ti = document.getElementById('art-title');
    if (!ta) return;
    const update = () => {
      const box = document.getElementById('preview-box'); if (!box) return;
      box.innerHTML = (ti&&ti.value ? `<h1>${esc(ti.value)}</h1>` : '') + renderMD(ta.value);
    };
    ta.addEventListener('input', update);
    if (ti) ti.addEventListener('input', update);
    if (ta.value) update();
  }

  window.saveArticle = async () => {
    const title = document.getElementById('art-title').value.trim();
    const cat   = document.getElementById('art-cat').value;
    const body  = document.getElementById('art-body').value.trim();
    if (!title || !body) { alert('Titre et contenu requis.'); return; }

    let error;
    if (editingId) {
      ({ error } = await sb.from('articles').update({ title, body, category: cat }).eq('id', editingId));
    } else {
      ({ error } = await sb.from('articles').insert({ title, body, category: cat }));
    }

    if (error) {
      const e = document.getElementById('err-msg'); e.style.display='inline';
      setTimeout(()=>e.style.display='none', 3000);
    } else {
      const m = document.getElementById('save-msg'); m.style.display='inline';
      setTimeout(()=>{ m.style.display='none'; showNew(); }, 1800);
    }
  };

  // ── LIST ──
  window.showList = async (cat) => {
    setSidebarActive(null);
    const panel = document.getElementById('main-panel');
    panel.innerHTML = `<h2>${labels[cat]}</h2><p style="color:var(--muted);font-size:0.85rem">Chargement...</p>`;
    const { data } = await sb.from('articles').select('id,title,created_at').eq('category',cat).order('created_at',{ascending:false});
    let items = !data||data.length===0
      ? '<p class="empty-msg">Aucun article dans cette catégorie.</p>'
      : data.map(a => {
          const date = new Date(a.created_at).toLocaleDateString('fr-FR');
          return `<div class="article-card">
            <div><div class="article-card-title">${esc(a.title)}</div><div class="article-card-meta">${date}</div></div>
            <div class="article-card-btns">
              <button class="btn-edit" onclick="editArticle('${a.id}','${cat}')">Modifier</button>
              <button class="btn-delete" onclick="deleteArticle('${a.id}','${cat}')">Supprimer</button>
            </div>
          </div>`;
        }).join('');
    panel.innerHTML = `<h2>${labels[cat]}</h2><div class="articles-list">${items}</div>`;
  };

  window.editArticle = async (id, cat) => {
    const { data } = await sb.from('articles').select('*').eq('id',id).single();
    if (!data) return;
    editingId = id;
    document.getElementById('main-panel').innerHTML = editorHTML(data);
    setupPreview();
  };

  window.deleteArticle = async (id, cat) => {
    if (!confirm('Supprimer cet article ?')) return;
    await sb.from('articles').delete().eq('id', id);
    showList(cat);
  };

  function setSidebarActive(id) {
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    if (id) { const el = document.getElementById(id); if (el) el.classList.add('active'); }
  }

  window.showNew = window.showNew;
</script>
</body>
</html>
