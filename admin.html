<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — X</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Coolvetica';
      src: url('https://db.onlinewebfonts.com/t/c1cb5de10a43a01b1a40e86fdbba3b2e.woff2') format('woff2'),
           url('https://db.onlinewebfonts.com/t/c1cb5de10a43a01b1a40e86fdbba3b2e.woff') format('woff');
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0d0d;
      --surface: #141414;
      --border:  rgba(255,255,255,0.08);
      --white:   #f0f0f0;
      --muted:   rgba(240,240,240,0.38);
      --accent:  #7c6af7;
      --grid:    rgba(255,255,255,0.03);
      --display: 'Coolvetica', 'Arial Black', sans-serif;
      --sans:    'Inter', system-ui, sans-serif;
    }
    html, body { height: 100%; }
    body {
      font-family: var(--sans);
      color: var(--white);
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 48px 48px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN ── */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      width: 340px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .login-title {
      font-family: var(--display);
      font-size: 2rem;
      color: var(--white);
    }
    .login-sub { font-size: 0.78rem; color: var(--muted); margin-top: -12px; }
    .login-box input[type="password"] {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--white);
      font-family: var(--sans);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-box input[type="password"]:focus { border-color: var(--accent); }
    .login-box input[type="password"]::placeholder { color: var(--muted); }
    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    #login-error { font-size: 0.78rem; color: #f87171; display: none; }

    /* ── ADMIN UI ── */
    #admin-ui { display: none; min-height: 100vh; }

    .admin-header {
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .admin-logo { font-family: var(--display); font-size: 1.6rem; color: var(--white); }
    .admin-logo span { opacity: 0.3; }
    .btn-logout {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--muted); color: var(--white); }

    .admin-body {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 73px);
    }

    /* ── SIDEBAR ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sidebar-label {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 4px;
    }
    .sidebar-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 0.88rem;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-btn:hover, .sidebar-btn.active {
      background: rgba(255,255,255,0.06);
      color: var(--white);
    }
    .sidebar-btn.active { font-weight: 500; }
    .sidebar-divider { height: 1px; background: var(--border); margin: 8px 0; }

    /* ── EDITOR PANEL ── */
    .editor-panel {
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 820px;
    }
    .editor-panel h2 {
      font-family: var(--display);
      font-weight: normal;
      font-size: 1.9rem;
      color: var(--white);
    }

    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .field input, .field select, .field textarea {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-family: var(--sans);
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field select option { background: #1a1a1a; }

    /* toolbar */
    .toolbar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      padding: 8px 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
    }
    .toolbar button {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 0.82rem;
      font-family: var(--sans);
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .toolbar button:hover {
      background: rgba(255,255,255,0.07);
      color: var(--white);
      border-color: var(--border);
    }
    .toolbar button b { font-weight: 700; }
    .toolbar-sep { width: 1px; background: var(--border); margin: 2px 2px; }

    .field textarea.body-area {
      border-radius: 0 0 8px 8px;
      min-height: 320px;
      line-height: 1.7;
      font-size: 0.95rem;
    }

    /* hint */
    .hint {
      font-size: 0.74rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .hint code {
      background: rgba(255,255,255,0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.78rem;
      color: var(--white);
    }

    /* preview */
    .preview-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 32px;
      line-height: 1.8;
      font-size: 0.95rem;
      color: var(--white);
      min-height: 120px;
    }
    .preview-box h1 {
      font-family: var(--display);
      font-weight: normal;
      font-size: 2rem;
      margin-bottom: 20px;
      color: var(--white);
    }
    .preview-box h2 {
      font-family: var(--display);
      font-weight: normal;
      font-size: 1.4rem;
      margin: 20px 0 10px;
      color: var(--white);
    }
    .preview-box p { margin-bottom: 12px; color: rgba(240,240,240,0.8); }
    .preview-box strong { color: var(--white); font-weight: 600; }
    .preview-box em { font-style: italic; color: rgba(240,240,240,0.7); }
    .preview-box blockquote {
      border-left: 2px solid var(--accent);
      padding-left: 16px;
      color: var(--muted);
      margin: 16px 0;
    }

    .row-btns { display: flex; gap: 12px; align-items: center; }
    .btn-save {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: var(--sans);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-secondary {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 12px 20px;
      font-family: var(--sans);
      font-size: 0.88rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: var(--muted); color: var(--white); }
    .save-msg { font-size: 0.8rem; color: #86efac; display: none; }

    /* ── ARTICLES LIST ── */
    .articles-list { display: flex; flex-direction: column; gap: 12px; }
    .article-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }
    .article-card-info { display: flex; flex-direction: column; gap: 4px; }
    .article-card-title { font-size: 1rem; font-weight: 500; color: var(--white); }
    .article-card-meta { font-size: 0.74rem; color: var(--muted); }
    .article-card-btns { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-edit, .btn-delete {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-edit { color: var(--muted); }
    .btn-edit:hover { color: var(--white); border-color: var(--muted); }
    .btn-delete { color: #f87171; }
    .btn-delete:hover { background: rgba(248,113,113,0.1); border-color: #f87171; }
    .empty-msg { color: var(--muted); font-size: 0.88rem; padding: 12px 0; }

    @media (max-width: 700px) {
      .admin-body { grid-template-columns: 1fr; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; flex-wrap: wrap; padding: 12px; }
      .editor-panel { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">X<span style="opacity:0.3">.</span></div>
    <p class="login-sub">Accès administration</p>
    <input type="password" id="pwd-input" placeholder="Mot de passe" />
    <p id="login-error">Mot de passe incorrect.</p>
    <button class="btn-primary" onclick="tryLogin()">Entrer</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-ui">
  <div class="admin-header">
    <div class="admin-logo">X<span>.</span> <span style="font-family:var(--sans);font-size:0.8rem;opacity:0.4;margin-left:10px;font-weight:400;">Admin</span></div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>
  <div class="admin-body">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-label">Actions</div>
      <button class="sidebar-btn active" id="btn-new" onclick="showView('new')">
        <span>✦</span> Nouvel article
      </button>
      <div class="sidebar-divider"></div>
      <div class="sidebar-label">Catégories</div>
      <button class="sidebar-btn" onclick="showView('list','philosophie')"><span>—</span> Philosophie</button>
      <button class="sidebar-btn" onclick="showView('list','psychologie')"><span>—</span> Psychologie</button>
      <button class="sidebar-btn" onclick="showView('list','theologie')"><span>—</span> Théologie</button>
      <button class="sidebar-btn" onclick="showView('list','sciences')"><span>—</span> Sciences</button>
      <button class="sidebar-btn" onclick="showView('list','it')"><span>—</span> IT</button>
    </div>

    <!-- MAIN PANEL -->
    <div class="editor-panel" id="main-panel">
      <!-- injected by JS -->
    </div>

  </div>
</div>

<script>
  // ── PASSWORD (change "admin123" par ton vrai mot de passe) ──
  const PASSWORD = "admin123";

  function tryLogin() {
    const val = document.getElementById('pwd-input').value;
    if (val === PASSWORD) {
      sessionStorage.setItem('x_admin', '1');
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-ui').style.display = 'block';
      showView('new');
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }
  document.getElementById('pwd-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin();
  });

  function logout() {
    sessionStorage.removeItem('x_admin');
    location.reload();
  }

  if (sessionStorage.getItem('x_admin') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-ui').style.display = 'block';
  }

  // ── VIEWS ──
  let editingId = null;

  function showView(view, cat) {
    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
    const panel = document.getElementById('main-panel');

    if (view === 'new' || view === 'edit') {
      document.getElementById('btn-new').classList.add('active');
      panel.innerHTML = editorHTML(cat);
      if (view === 'edit' && cat) loadArticleIntoEditor(cat);
      setupPreview();
    } else if (view === 'list') {
      panel.innerHTML = listHTML(cat);
    }
  }

  function editorHTML(cat) {
    const catVal = cat || '';
    return `
      <h2>Nouvel article</h2>
      <input type="hidden" id="edit-id" value="" />

      <div class="field">
        <label>Titre</label>
        <input type="text" id="art-title" placeholder="Titre de l'article" />
      </div>

      <div class="field">
        <label>Catégorie</label>
        <select id="art-cat">
          <option value="philosophie" ${catVal==='philosophie'?'selected':''}>Philosophie</option>
          <option value="psychologie" ${catVal==='psychologie'?'selected':''}>Psychologie</option>
          <option value="theologie"   ${catVal==='theologie'?'selected':''}>Théologie</option>
          <option value="sciences"    ${catVal==='sciences'?'selected':''}>Sciences</option>
          <option value="it"          ${catVal==='it'?'selected':''}>IT</option>
        </select>
      </div>

      <div class="field">
        <label>Contenu</label>
        <div class="toolbar">
          <button onclick="wrap('**','**')" title="Gras"><b>B</b></button>
          <button onclick="wrap('*','*')"   title="Italique"><em>I</em></button>
          <div class="toolbar-sep"></div>
          <button onclick="insertLine('## ')" title="Sous-titre">H2</button>
          <button onclick="insertLine('### ')" title="Petit titre">H3</button>
          <div class="toolbar-sep"></div>
          <button onclick="insertLine('> ')" title="Citation">❝</button>
          <button onclick="insertLine('---')" title="Séparateur">—</button>
          <div class="toolbar-sep"></div>
          <button onclick="insertLine('- ')" title="Liste">• Liste</button>
        </div>
        <textarea class="body-area" id="art-body" placeholder="Écris ton article ici...&#10;&#10;**texte en gras** avec double astérisques&#10;*texte en italique* avec un seul astérisque&#10;## Sous-titre&#10;> Citation"></textarea>
      </div>

      <div class="hint">
        Formatage : <code>**gras**</code> &nbsp;·&nbsp; <code>*italique*</code> &nbsp;·&nbsp; <code>## Titre</code> &nbsp;·&nbsp; <code>### Sous-titre</code> &nbsp;·&nbsp; <code>> Citation</code> &nbsp;·&nbsp; <code>---</code> séparateur &nbsp;·&nbsp; <code>- item</code> liste
      </div>

      <div class="field">
        <label>Aperçu</label>
        <div class="preview-box" id="preview-box"><span style="color:var(--muted);font-size:0.85rem;">L'aperçu apparaît ici...</span></div>
      </div>

      <div class="row-btns">
        <button class="btn-save" onclick="saveArticle()">Publier</button>
        <button class="btn-secondary" onclick="clearEditor()">Effacer</button>
        <span class="save-msg" id="save-msg">✓ Article sauvegardé</span>
      </div>
    `;
  }

  function listHTML(cat) {
    const labels = {philosophie:'Philosophie',psychologie:'Psychologie',theologie:'Théologie',sciences:'Sciences',it:'IT'};
    const articles = JSON.parse(localStorage.getItem('articles_' + cat) || '[]');
    let items = articles.length === 0
      ? '<p class="empty-msg">Aucun article dans cette catégorie.</p>'
      : articles.map(a => `
        <div class="article-card">
          <div class="article-card-info">
            <div class="article-card-title">${escHtml(a.title)}</div>
            <div class="article-card-meta">${a.date}</div>
          </div>
          <div class="article-card-btns">
            <button class="btn-edit" onclick="editArticle('${cat}','${a.id}')">Modifier</button>
            <button class="btn-delete" onclick="deleteArticle('${cat}','${a.id}')">Supprimer</button>
          </div>
        </div>
      `).join('');
    return `<h2>${labels[cat]}</h2><div class="articles-list">${items}</div>`;
  }

  // ── MARKDOWN → HTML (simple) ──
  function renderMD(text) {
    if (!text) return '';
    const lines = text.split('\n');
    let html = '';
    lines.forEach(line => {
      if (/^### (.+)/.test(line))       html += `<h2>${md_inline(line.slice(4))}</h2>`;
      else if (/^## (.+)/.test(line))   html += `<h2>${md_inline(line.slice(3))}</h2>`;
      else if (/^> (.+)/.test(line))    html += `<blockquote>${md_inline(line.slice(2))}</blockquote>`;
      else if (/^---/.test(line))       html += `<hr style="border:none;border-top:1px solid rgba(255,255,255,0.1);margin:20px 0"/>`;
      else if (/^- (.+)/.test(line))    html += `<p>• ${md_inline(line.slice(2))}</p>`;
      else if (line.trim() === '')      html += '';
      else                              html += `<p>${md_inline(line)}</p>`;
    });
    return html;
  }

  function md_inline(t) {
    return t
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>');
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── TOOLBAR HELPERS ──
  function wrap(before, after) {
    const ta = document.getElementById('art-body');
    if (!ta) return;
    const s = ta.selectionStart, e = ta.selectionEnd;
    const sel = ta.value.slice(s, e) || 'texte';
    ta.setRangeText(before + sel + after, s, e, 'end');
    ta.dispatchEvent(new Event('input'));
    ta.focus();
  }
  function insertLine(prefix) {
    const ta = document.getElementById('art-body');
    if (!ta) return;
    const s = ta.selectionStart;
    const lineStart = ta.value.lastIndexOf('\n', s - 1) + 1;
    ta.setRangeText('\n' + prefix, s, s, 'end');
    ta.dispatchEvent(new Event('input'));
    ta.focus();
  }

  // ── LIVE PREVIEW ──
  function setupPreview() {
    const ta = document.getElementById('art-body');
    const titleInput = document.getElementById('art-title');
    if (!ta) return;
    function update() {
      const box = document.getElementById('preview-box');
      if (!box) return;
      const title = titleInput ? titleInput.value : '';
      box.innerHTML = (title ? `<h1>${escHtml(title)}</h1>` : '') + renderMD(ta.value);
    }
    ta.addEventListener('input', update);
    if (titleInput) titleInput.addEventListener('input', update);
  }

  // ── SAVE ──
  function saveArticle() {
    const title = document.getElementById('art-title').value.trim();
    const cat   = document.getElementById('art-cat').value;
    const body  = document.getElementById('art-body').value.trim();
    if (!title || !body) { alert('Titre et contenu requis.'); return; }

    const articles = JSON.parse(localStorage.getItem('articles_' + cat) || '[]');
    const existingId = document.getElementById('edit-id').value;

    if (existingId) {
      const idx = articles.findIndex(a => a.id === existingId);
      if (idx !== -1) { articles[idx].title = title; articles[idx].body = body; }
    } else {
      articles.unshift({ id: Date.now().toString(), title, body, date: new Date().toLocaleDateString('fr-FR') });
    }

    localStorage.setItem('articles_' + cat, JSON.stringify(articles));
    const msg = document.getElementById('save-msg');
    msg.style.display = 'inline';
    setTimeout(() => { msg.style.display = 'none'; clearEditor(); }, 1800);
  }

  function clearEditor() {
    const t = document.getElementById('art-title');
    const b = document.getElementById('art-body');
    const i = document.getElementById('edit-id');
    if (t) t.value = '';
    if (b) b.value = '';
    if (i) i.value = '';
    const box = document.getElementById('preview-box');
    if (box) box.innerHTML = '<span style="color:var(--muted);font-size:0.85rem;">L\'aperçu apparaît ici...</span>';
  }

  // ── EDIT / DELETE ──
  function editArticle(cat, id) {
    showView('edit');
    document.getElementById('art-cat').value = cat;
    const articles = JSON.parse(localStorage.getItem('articles_' + cat) || '[]');
    const a = articles.find(x => x.id === id);
    if (!a) return;
    document.getElementById('art-title').value = a.title;
    document.getElementById('art-body').value  = a.body;
    document.getElementById('edit-id').value   = id;
    document.getElementById('main-panel').querySelector('h2').textContent = 'Modifier l\'article';
    document.querySelector('.btn-save').textContent = 'Sauvegarder';
  }

  function loadArticleIntoEditor(cat) { /* handled in editArticle */ }

  function deleteArticle(cat, id) {
    if (!confirm('Supprimer cet article ?')) return;
    const articles = JSON.parse(localStorage.getItem('articles_' + cat) || '[]');
    localStorage.setItem('articles_' + cat, JSON.stringify(articles.filter(a => a.id !== id)));
    showView('list', cat);
  }
</script>

</body>
</html>
